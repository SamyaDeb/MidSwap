<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="usdcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2775CA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A5FB4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#usdcGrad)"/>
  <!-- Dollar sign -->
  <text x="50" y="68" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="white" text-anchor="middle">$</text>
  <!-- Top and bottom lines for USDC style -->
  <line x1="50" y1="15" x2="50" y2="25" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="75" x2="50" y2="85" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#1A5FB4" stroke-width="2"/>
</svg>
